name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Create release for tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --verify-tag

  build:
    name: Build ${{ matrix.name }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            script: build:win
            artifact: windows-installer
            paths: |
              dist/*.exe
              dist/*.blockmap
              dist/latest*.yml
              dist/payload-*
          - name: macOS
            os: macos-15-intel
            script: build:mac
            artifact: macos-installer
            paths: |
              dist/*.dmg
              dist/*.zip
              dist/*.blockmap
              dist/latest*.yml
              dist/payload-*
          - name: Linux
            os: ubuntu-latest
            script: build:linux
            artifact: linux-installer
            paths: |
              dist/*.AppImage
              dist/*.deb
              dist/*.rpm
              dist/*.blockmap
              dist/latest*.yml
              dist/payload-*

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python-backend/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r python-backend/requirements.txt

      - name: Verify JavaScript bundle
        run: npm run check:js

      - name: Smoke test backend
        run: npm run smoke:backend:quick

      - name: Build installer
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Build payload update assets
        run: npm run build:payloads

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          RELEASE_ASSET_GLOBS: ${{ matrix.paths }}
        run: |
          shopt -s nullglob

          assets=()
          while IFS= read -r pattern; do
            [[ -z "$pattern" ]] && continue
            for file in $pattern; do
              [[ -f "$file" ]] && assets+=("$file")
            done
          done <<< "$RELEASE_ASSET_GLOBS"

          if (( ${#assets[@]} == 0 )); then
            echo "No release assets found in dist."
            exit 1
          fi

          printf 'Uploading release asset: %s\n' "${assets[@]}"
          gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
