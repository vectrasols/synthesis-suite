name: Feature request
description: Suggest an improvement for Synthesis.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or user need would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Data loading
        - Cleaning/preprocessing
        - Visualization
        - Model training
        - Algorithm demos
        - Packaging/installers
        - Documentation
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, screenshots, datasets, or related links if useful.
